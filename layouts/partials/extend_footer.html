<script>
  // 카테고리 페이지: 시리즈 필터 + "더보기" 점진 렌더 (대량 DOM 초기 표시 최소화)
  (function () {
    var list = document.getElementById("series-list");
    if (!list) return;

    var filter = document.querySelector(".series-filter");
    var moreBtn = document.getElementById("series-more");
    var entries = Array.prototype.slice.call(list.querySelectorAll(".post-entry"));
    var PAGE = 30;
    var current = "all";
    var limit = PAGE;

    function matches(entry) {
      if (current === "all") return true;
      var series = (entry.getAttribute("data-series") || "").split("|").filter(Boolean);
      return series.indexOf(current) !== -1;
    }

    function render() {
      var shown = 0;
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        if (matches(e) && shown < limit) {
          e.style.display = "";
          shown++;
        } else {
          e.style.display = "none";
        }
      }
      // 필터에 걸린 전체 개수
      var total = 0;
      for (var j = 0; j < entries.length; j++) if (matches(entries[j])) total++;
      if (moreBtn) moreBtn.style.display = shown < total ? "" : "none";
    }

    if (filter) {
      filter.addEventListener("click", function (e) {
        var btn = e.target.closest(".series-btn");
        if (!btn) return;
        current = btn.getAttribute("data-series");
        limit = PAGE;
        var btns = filter.querySelectorAll(".series-btn");
        for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
        btn.classList.add("active");
        render();
      });
    }
    if (moreBtn) {
      moreBtn.addEventListener("click", function () {
        limit += PAGE;
        render();
      });
    }
    render();
  })();
</script>
