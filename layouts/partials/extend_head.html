{{- /* 검색 결과에 사이트명이 "GitHub"로 표기되는 문제 대응: 홈페이지에 WebSite 구조화 데이터 선언 */ -}}
{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ site.Title }},
  "url": {{ site.BaseURL }}
}
</script>
{{- end }}

<style>
  /* 최근 글 N 뱃지 (글 제목 옆) */
  .post-new {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.4;
    color: #fff;
    background: #ff7a18;
    border-radius: 10px;
    vertical-align: middle;
    top: 0;
  }

  /* 최근 글 있는 메뉴 옆 N 뱃지 */
  .menu-new {
    display: inline-block;
    margin-left: 3px;
    padding: 0 5px;
    font-size: 9px;
    font-weight: 700;
    line-height: 15px;
    color: #fff;
    background: #ff7a18;
    border-radius: 8px;
    vertical-align: super;
    top: 0;
  }

  /* 목차(TOC) 링크 커서: 손가락 모양 */
  .toc a,
  .toc .details,
  .toc summary,
  nav#TableOfContents a {
    cursor: pointer;
  }

  /* 본문 이미지: 클릭하면 크게 볼 수 있음을 커서로 안내 */
  .post-content .img-zoom {
    display: inline-block;
    cursor: zoom-in;
  }
  .post-content .img-zoom img {
    cursor: zoom-in;
  }

  /* 카테고리 페이지 시리즈 필터 바 */
  .series-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 20px 0 28px;
  }
  .series-filter .series-btn {
    padding: 5px 12px;
    font-size: 14px;
    font-weight: 500;
    color: var(--secondary);
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .series-filter .series-btn:hover {
    color: var(--primary);
    border-color: #ff7a18;
  }
  .series-filter .series-btn.active {
    color: #fff;
    background: #ff7a18;
    border-color: #ff7a18;
  }
  .series-filter .series-count {
    opacity: 0.7;
    font-size: 12px;
  }
</style>
