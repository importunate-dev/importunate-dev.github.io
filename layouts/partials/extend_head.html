{{- /* 검색 결과에 사이트명이 "GitHub"로 표기되는 문제 대응: 홈페이지에 WebSite 구조화 데이터 선언 */ -}}
{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ site.Title }},
  "url": {{ site.BaseURL }}
}
</script>
{{- end }}

<style>
  /* 최근 글 N 뱃지 (글 제목 옆) — 작은 원형 */
  .post-new {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 17px;
    height: 17px;
    margin-left: 6px;
    padding: 0;
    font-size: 10px;
    font-weight: 700;
    line-height: 1;
    color: #fff;
    background: #ff7a18;
    border-radius: 50%;
    vertical-align: middle;
    top: 0;
  }

  /* 최근 글 있는 메뉴 옆 N 뱃지 */
  .menu-new {
    display: inline-block;
    margin-left: 3px;
    padding: 0 5px;
    font-size: 9px;
    font-weight: 700;
    line-height: 15px;
    color: #fff;
    background: #ff7a18;
    border-radius: 8px;
    vertical-align: super;
    top: 0;
  }

  /* 목차(TOC) 링크 커서: 손가락 모양 */
  .toc a,
  .toc .details,
  .toc summary,
  nav#TableOfContents a {
    cursor: pointer;
  }

  /* 본문 이미지: 클릭하면 크게 볼 수 있음을 커서로 안내 */
  .post-content .img-zoom {
    display: inline-block;
    cursor: zoom-in;
  }
  .post-content .img-zoom img {
    cursor: zoom-in;
  }

  /* 카테고리 페이지 시리즈 필터 바 */
  .series-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 20px 0 28px;
  }
  .series-filter .series-btn {
    padding: 5px 12px;
    font-size: 14px;
    font-weight: 500;
    color: var(--secondary);
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .series-filter .series-btn:hover {
    color: var(--primary);
    border-color: #ff7a18;
  }
  .series-filter .series-btn.active {
    color: #fff;
    background: #ff7a18;
    border-color: #ff7a18;
  }
  .series-filter .series-count {
    opacity: 0.7;
    font-size: 12px;
  }

  /* 카테고리 페이지 "더보기" 버튼 */
  .series-more {
    display: block;
    width: 100%;
    margin: 8px 0 24px;
    padding: 12px;
    font-size: 15px;
    font-weight: 500;
    color: var(--primary);
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }
  .series-more:hover {
    border-color: #ff7a18;
  }

  /* 글 하단 시리즈 목차 박스 */
  .series-box {
    margin: 24px 0;
    padding: 12px 16px;
    background: var(--entry);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .series-box summary {
    cursor: pointer;
    font-weight: 600;
    color: var(--primary);
  }
  .series-box summary a {
    color: #ff7a18;
  }
  .series-box .series-count {
    color: var(--secondary);
    font-weight: 400;
    font-size: 14px;
  }
  .series-box ol {
    margin: 10px 0 4px;
    padding-inline-start: 2.2em;
  }
  .series-box ol li {
    margin: 5px 0;
    font-size: 15px;
  }
  .series-box ol li a {
    color: var(--secondary);
  }
  .series-box ol li a:hover {
    color: #ff7a18;
  }
  .series-box ol li.current {
    font-weight: 700;
    color: var(--primary);
  }
  .series-box ol li.current::marker {
    color: #ff7a18;
  }
  .series-box .series-window-more {
    margin: 6px 0;
    font-size: 14px;
  }
  .series-box .series-window-more a {
    color: var(--secondary);
    text-decoration: underline dotted;
  }

  /* 글 하단 관련 글 추천 */
  .related-posts {
    margin: 24px 0;
  }
  .related-posts .related-title {
    margin-bottom: 10px;
    font-size: 18px;
  }
  .related-posts ul {
    list-style: none;
    padding: 0;
    display: grid;
    gap: 8px;
  }
  .related-posts li a {
    display: block;
    padding: 10px 14px;
    background: var(--entry);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s ease;
  }
  .related-posts li a:hover {
    border-color: #ff7a18;
  }
  .related-post-title {
    display: block;
    color: var(--primary);
    font-weight: 500;
  }
  .related-post-meta {
    display: block;
    margin-top: 2px;
    color: var(--secondary);
    font-size: 13px;
  }
</style>
