baseURL = "https://importunate-dev.github.io/"
locale = "ko"
defaultContentLanguage = "ko"
timeZone = "Asia/Seoul"
title = "Importunate"
theme = "PaperMod"
[pagination]
  pagerSize = 10

# Build
enableRobotsTXT = true
buildDrafts = false
buildFuture = true
buildExpired = false
enableEmoji = false

# SEO
[sitemap]
  changefreq = "weekly"
  priority = 0.5

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Importunate"
  description = "샐러드랩 백엔드 개발자 배준수의 기술 블로그. 데이터베이스, CS, 인프라를 공부하고 실무에서 고민한 과정을 기록합니다."
  keywords = ["programmer", "backend", "developer", "blog"]
  author = "배준수"
  # 커버 없는 글의 og:image 폴백 (추후 1200×630 전용 이미지로 교체 권장)
  images = ["apple-touch-icon.png"]

  defaultTheme = "auto"
  disableThemeToggle = false
  # 최근 글(N 뱃지) 기준 일수
  recentDays = 7
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  comments = true

  [params.homeInfoParams]
    Title = "Importunate"
    Content = "샐러드랩 3년차 백엔드 개발자 배준수의 기술 블로그입니다. 데이터베이스, 컴퓨터 구조, 인프라를 공부하고 실무에서 고민한 과정을 기록합니다."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/importunate-dev"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/junsu-594122277"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:importunate.dev@gmail.com"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    URL = "https://github.com/importunate-dev/importunate-dev.github.io/tree/main/content"
    Text = "수정 제안"
    appendFilePath = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "content"]

  # 개인 블로그 — JSON-LD publisher를 Organization 대신 Person으로
  [params.schema]
    publisherType = "person"

  [params.analytics.naver]
    SiteVerificationTag = "4a2034ee708e9eb4dea2033d4e1ae11d33f87b64"

# Analytics
[services]
  [services.googleAnalytics]
    id = "G-M5XGPL2PKX"

# Menu
[[menu.main]]
  identifier = "home"
  name = "홈"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "nav-about"
  name = "소개"
  url = "/about/"
  weight = 15

[[menu.main]]
  identifier = "cat-study"
  name = "공부"
  url = "/categories/study/"
  weight = 20

[[menu.main]]
  identifier = "cat-log"
  name = "로그"
  url = "/categories/log/"
  weight = 30

[[menu.main]]
  identifier = "cat-project"
  name = "프로젝트"
  url = "/categories/project/"
  weight = 40

[[menu.main]]
  identifier = "cat-life"
  name = "일상"
  url = "/categories/life/"
  weight = 50

[[menu.main]]
  identifier = "cat-notice"
  name = "공지"
  url = "/categories/notice/"
  weight = 55

[[menu.main]]
  identifier = "nav-search"
  name = "검색"
  url = "/search/"
  weight = 60

[[menu.main]]
  identifier = "nav-archive"
  name = "아카이브"
  url = "/archives/"
  weight = 80

# Permalinks — posts 하위 폴더(카테고리/시리즈) 위치와 무관하게 URL을 파일명 기준으로 고정
[permalinks]
  posts = "/posts/:contentbasename/"

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# Related Content(관련 글 추천) — series는 의도적으로 제외:
# 시리즈 탐색은 글 하단 시리즈 박스가 담당하고, weekly(315편)끼리 추천이 도배되는 것을 방지
[related]
  includeNewer = true
  toLower = true
  threshold = 30
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 40
  [[related.indices]]
    name = "date"
    weight = 10

# Outputs
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Markup
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
